name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ USDS Risk Capital Vault Tests ============
  test-usds-risk-capital:
    name: USDS Risk Capital Vault Tests
    runs-on: ubuntu-latest

    env:
      VAULT_ADDRESS: "0xf42bca228D9bd3e2F8EE65Fec3d21De1063882d4"
      USDS_BLOCK_NUMBER: 24284915

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run USDS Risk Capital vault deployment tests
        run: |
          forge test --match-contract DeployUsdsRiskCapitalScript --fork-url ${{ secrets.RPC_URL }} -vvvv

      - name: Run USDS Risk Capital vault deployed tests
        run: |
          forge test --match-contract DeployedUsdsRiskCapitalVault --fork-url ${{ secrets.RPC_URL }} --fork-block-number ${{ env.USDS_BLOCK_NUMBER }} -vvvv

  # ============ USDC Risk Capital Vault Tests ============
  test-usdc-risk-capital:
