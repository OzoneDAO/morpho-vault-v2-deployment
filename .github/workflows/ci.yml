  # ============ Flagship Vault Tests ============
  test-flagship-vault:
    name: Flagship Vault Tests
    runs-on: ubuntu-latest

    env:
      VAULT_ADDRESS: "0xE15fcC81118895b67b6647BBd393182dF44E11E0"
      ADAPTER_ADDRESS: "0xf94BE39e8863183Ff41194b5923627C90A34039D"
      ORACLE_CBBTC: "0xA5AEb90F9f122989fE69Ae6224Ed923A0caF33B4"
      ORACLE_WSTETH: "0xc9A9440d1545047b2Ce3624DB425410cF2EAE292"
      ORACLE_WETH: "0x76b2242ea5BE1FCBBF4206EA09601EA5aB22Af4d"
      FLAGSHIP_BLOCK_NUMBER: 24441446

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run Flagship vault script tests
        run: |
          forge test --match-contract DeployFlagshipScript --fork-url ${{ secrets.RPC_URL }} -vvvv

      - name: Run Flagship deployed tests
        run: |
          forge test --match-path "test/flagship/deployed/*" --fork-url ${{ secrets.RPC_URL }} --fork-block-number ${{ env.FLAGSHIP_BLOCK_NUMBER }} -vvvv
