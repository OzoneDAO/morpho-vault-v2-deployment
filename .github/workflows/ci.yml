      - name: Run USDC Risk Capital vault deployed tests
        run: |
          forge test --match-contract DeployedUsdcRiskCapitalVault --fork-url ${{ secrets.RPC_URL }} --fork-block-number ${{ env.USDC_BLOCK_NUMBER }} -vvvv

  # ============ USDT Risk Capital Vault Tests ============
