  # ============ USDT Savings Vault Tests ============
  test-usdt-savings:
    name: USDT Savings Vault Tests
    runs-on: ubuntu-latest

    env:
      VAULT_ADDRESS: "0x23f5E9c35820f4baB695Ac1F19c203cC3f8e1e11"
      USDT_SAV_BLOCK_NUMBER: 24569066

    steps:
      - uses: actions/checkout@v4
        with:
