    runs-on: ubuntu-latest

    env:
      VAULT_ADDRESS: "0x56bfa6f53669B836D1E0Dfa5e99706b12c373ecf"
      USDC_BLOCK_NUMBER: 24507943

    steps:
      - uses: actions/checkout@v4
